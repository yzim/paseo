name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # CI does not use the CUDA execution provider, and the onnxruntime-node
  # postinstall download from NuGet is large enough to make npm ci flaky.
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  format:
    runs-on: ubuntu-latest
    env:
      # This job never executes Electron. Skipping the hosted binary avoids
      # unrelated npm ci failures when Electron's CDN returns 504.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          if ! npx oxfmt --check .; then
            echo "::group::git diff --stat"
            git diff --stat
            echo "::endgroup::"

            echo "::group::git diff"
            git diff -- . ':(exclude)package-lock.json'
            echo "::endgroup::"

            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint lockfile
        run: npx --yes lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https --validate-integrity

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server stack
        run: |
          if ! npm run build:server; then
            echo "::group::packages/highlight/package.json"
            cat packages/highlight/package.json
            echo "::endgroup::"

            echo "::group::npm ls @replit/codemirror-lang-csharp"
            npm ls @replit/codemirror-lang-csharp || true
            echo "::endgroup::"

            exit 1
          fi

      - name: Typecheck all packages
        run: |
          if ! npm run typecheck; then
            echo "::group::git status"
            git status --short
            echo "::endgroup::"

            exit 1
          fi

      - name: Verify public package contents
        run: |
          npm pack --dry-run --ignore-scripts --workspace=@getpaseo/protocol
          npm pack --dry-run --ignore-scripts --workspace=@getpaseo/client
          npm pack --dry-run --ignore-scripts --workspace=@getpaseo/server

  server-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: server-tests (${{ matrix.os }})
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Fetch origin/main (worktree tests)
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Install dependencies
        run: npm ci

      - name: Install agent CLIs for provider tests
        run: npm install -g @anthropic-ai/claude-code opencode-ai

      - name: Build server dependencies
        run: npm run build:server-deps

      - name: Run server tests
        run: npm run test --workspace=@getpaseo/server
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies with Electron retry
        if: runner.os != 'Windows'
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            else
              exit_code=$?
            fi
            if [ "$attempt" -eq 3 ]; then
              exit $exit_code
            fi
            sleep $((attempt * 20))
          done

      - name: Install dependencies with Electron retry
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            npm ci
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds (20 * $attempt)
          }

      - name: Build server stack
        run: npm run build:server

      - name: Run desktop tests
        run: npm run test --workspace=@getpaseo/desktop

  app-tests:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies with retry
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            else
              exit_code=$?
            fi
            if [ "$attempt" -eq 3 ]; then
              exit $exit_code
            fi
            sleep $((attempt * 20))
          done

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: Build app dependencies
        run: npm run build:app-deps

      - name: Run app unit tests
        run: npm run test --workspace=@getpaseo/app

  sdk-tests:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build client dependencies
        run: npm run build:client

      - name: Run protocol tests
        run: npm run test --workspace=@getpaseo/protocol

      - name: Run client tests
        run: npm run test --workspace=@getpaseo/client

      - name: Typecheck client examples
        run: npm run typecheck:examples --workspace=@getpaseo/client

  playwright:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    name: playwright (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies with retry
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            else
              exit_code=$?
            fi
            if [ "$attempt" -eq 3 ]; then
              exit $exit_code
            fi
            sleep $((attempt * 20))
          done

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install chromium

      - name: Build app dependencies
        run: npm run build:app-deps

      - name: Build server stack
        run: npm run build:server

      - name: Install agent CLIs for provider tests
        run: npm install -g @anthropic-ai/claude-code @openai/codex@0.105.0 opencode-ai

      - name: Run Playwright E2E tests
        run: npm run test:e2e --workspace=@getpaseo/app -- --shard=${{ matrix.shard }}/4
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-${{ matrix.shard }}
          path: |
            packages/app/test-results/
            packages/app/playwright-report/
          retention-days: 7

  relay-tests:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build relay
        run: npm run build:relay

      - name: Run relay tests
        run: npm run test --workspace=@getpaseo/relay

  cli-tests:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    name: cli-tests (shard ${{ matrix.shard }}/3)
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install agent CLIs for provider tests
        run: npm install -g @anthropic-ai/claude-code @openai/codex@0.105.0 opencode-ai

      - name: Run CLI tests
        run: npm run test --workspace=@getpaseo/cli
        env:
          PASEO_LOCAL_SPEECH_AUTO_DOWNLOAD: "0"
          PASEO_DICTATION_ENABLED: "0"
          PASEO_VOICE_MODE_ENABLED: "0"
          PASEO_CLI_TEST_SHARD: ${{ matrix.shard }}
          PASEO_CLI_TEST_SHARD_TOTAL: "3"
